name: Deploy to VPS

# Spustí se při tagu v libovolném z těchto formátů:
#   v1.0.0  /  v2.3.1-hotfix      (semver)
#   release/1.0.0  /  release/hotfix/1.0.1
on:
  push:
    tags:
      - 'release/**'   # release/1.0.0, release/hotfix/1.0.1 …

# Zabrání souběžným deployům — druhý tag počká, třetí předchozí nezruší
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true     # přeruší při první chybě (set -e)
          envs: GITHUB_REF_NAME
          script: |
            set -euo pipefail
            cd /home/deploy/ChallengeMe

            echo "==> Fetching tag: $GITHUB_REF_NAME"
            # --force: zajistí aktualizaci tagu i po force-push
            # --prune: odstraní smazané remote refs
            git fetch origin --tags --force --prune

            # Prefix "tags/" odstraňuje nejednoznačnost (tag vs. branch se stejným jménem)
            # -f přepíše lokální změny (build artefakty apod.)
            git checkout -f "tags/$GITHUB_REF_NAME"

            echo "==> Building & starting services"
            # --wait:         blokuje dokud všechny kontejnery s healthcheckem nejsou healthy
            # --wait-timeout: selže po 3 minutách místo věčného čekání
            docker compose up -d --build --remove-orphans --wait --wait-timeout 180

            echo "==> Pruning dangling images"
            docker image prune -f

            echo "==> Deployed $GITHUB_REF_NAME successfully"
