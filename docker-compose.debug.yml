# Debug override — spusť spolu s hlavním compose:
#   docker compose -f docker-compose.yml -f docker-compose.debug.yml up --build
#
# Co přidává oproti normálnímu spuštění:
#   • PostgreSQL port 5432 dostupný z hosta  (DBeaver, pgAdmin, psql, …)
#   • JVM remote debug port 5005             (IntelliJ / VS Code Attach)
#   • Adminer web UI na http://localhost:8888 (správa DB v prohlížeči)
#   • Verbose SQL + aplikační logy
#   • Spring Boot Actuator — všechny endpointy

services:

  # ── PostgreSQL: vystav port na host ─────────────────────────────────────────
  db:
    ports:
      - "5432:5432"

  # ── Backend: JVM debug + verbose logy + actuator ────────────────────────────
  backend:
    ports:
      - "5005:5005"
    environment:
      # JDWP — suspend=n = nečeká na debugger, hned startuje
      JAVA_TOOL_OPTIONS: >-
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      # SQL logy
      SPRING_JPA_SHOW_SQL: "true"
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: DEBUG
      LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL: TRACE
      # Aplikační logy
      LOGGING_LEVEL_ORG_JAN: DEBUG
      # Actuator — všechny endpointy
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always

  # ── Adminer: web UI pro PostgreSQL ──────────────────────────────────────────
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
