# Default to H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb

# ── CORS (override with env var in production) ─────────────────────────────
# Example: CORS_ALLOWED_ORIGINS=https://challengeme.app,https://www.challengeme.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Email (override in production with env vars) ───────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.base-url=${APP_BASE_URL:http://localhost:5173}
app.mail.from=${MAIL_FROM:noreply@challengeme.app}

# Minimum completed games (wins+losses+draws) required before a reputation score is shown.
# Default = 1 (show after first game). Raise to e.g. 5 to require more game history.
app.reputation.min-games=${REPUTATION_MIN_GAMES:1}
